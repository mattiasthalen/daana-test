<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('theme');
        if (stored === 'light' || stored === 'dark') {
          document.documentElement.setAttribute('data-theme', stored);
        }
      } catch (e) { /* localStorage unavailable; fall through to system */ }
    })();
  </script>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="header">
    <h1 class="header__title">Northwind</h1>
    <p class="header__subtitle">Employee Performance Dashboard (1997)</p>
    <div class="theme-toggle" role="radiogroup" aria-label="Theme">
      <button class="theme-toggle__btn" data-theme-choice="light"
              role="radio" aria-checked="false"
              aria-label="Light theme" title="Light">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4"></circle>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path>
        </svg>
      </button>
      <button class="theme-toggle__btn" data-theme-choice="system"
              role="radio" aria-checked="false"
              aria-label="Follow system theme" title="System">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="2" y="3" width="20" height="14" rx="2"></rect>
          <path d="M8 21h8M12 17v4"></path>
        </svg>
      </button>
      <button class="theme-toggle__btn" data-theme-choice="dark"
              role="radio" aria-checked="false"
              aria-label="Dark theme" title="Dark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </button>
    </div>
  </header>

  <nav class="tabs">
    <button class="tabs__btn tabs__btn--active" data-tab="overview">Overview</button>
    <button class="tabs__btn" data-tab="throughput">Throughput</button>
    <button class="tabs__btn" data-tab="input">Input</button>
    <button class="tabs__btn" data-tab="correlations">Correlations</button>
  </nav>

  <main class="content">
    {{ content }}
  </main>

  <footer class="footer">
    <p>Data source: Northwind Traders via Daana DW</p>
  </footer>

  <script src="{{ '/assets/js/dashboard.js' | relative_url }}"></script>
</body>
</html>
