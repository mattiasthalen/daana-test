entity_id: "ORDER"

mapping_groups:
  - name: "default_mapping_group"
    allow_multiple_identifiers: false

    tables:
      - connection: "dev"
        table: "das.orders"

        primary_keys:
          - order_id

        ingestion_strategy: FULL

        entity_effective_timestamp_expression: "CURRENT_TIMESTAMP"

        attributes:
          - id: "ORDER_ID"
            transformation_expression: "CAST(order_id AS VARCHAR)"

          - id: "ORDER_DATE"
            transformation_expression: "order_date"

          - id: "REQUIRED_DATE"
            transformation_expression: "required_date"

          - id: "SHIPPED_DATE"
            transformation_expression: "shipped_date"

          - id: "FREIGHT"
            transformation_expression: "freight"

          - id: "SHIP_NAME"
            transformation_expression: "ship_name"

          - id: "SHIP_ADDRESS"
            transformation_expression: "ship_address"

          - id: "SHIP_CITY"
            transformation_expression: "ship_city"

          - id: "SHIP_REGION"
            transformation_expression: "ship_region"

          - id: "SHIP_POSTAL_CODE"
            transformation_expression: "ship_postal_code"

          - id: "SHIP_COUNTRY"
            transformation_expression: "ship_country"

    relationships:
      - id: "ORDER_IS_PLACED_BY_CUSTOMER"
        source_table: "das.orders"
        target_transformation_expression: "customer_id"

      - id: "ORDER_IS_HANDLED_BY_EMPLOYEE"
        source_table: "das.orders"
        target_transformation_expression: "CAST(employee_id AS VARCHAR)"
