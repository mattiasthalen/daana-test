entity_id: "CUSTOMER"

mapping_groups:
  - name: "default_mapping_group"
    allow_multiple_identifiers: false

    tables:
      - connection: "dev"
        table: "das.customers"

        primary_keys:
          - customer_id

        ingestion_strategy: FULL

        entity_effective_timestamp_expression: "updated_at"

        attributes:
          - id: "CUSTOMER_ID"
            transformation_expression: "customer_id"

          - id: "COMPANY_NAME"
            transformation_expression: "company_name"

          - id: "CONTACT_NAME"
            transformation_expression: "contact_name"

          - id: "CONTACT_TITLE"
            transformation_expression: "contact_title"

          - id: "CUSTOMER_ADDRESS"
            transformation_expression: "address"

          - id: "CUSTOMER_CITY"
            transformation_expression: "city"

          - id: "CUSTOMER_REGION"
            transformation_expression: "region"

          - id: "CUSTOMER_POSTAL_CODE"
            transformation_expression: "postal_code"

          - id: "CUSTOMER_COUNTRY"
            transformation_expression: "country"

          - id: "PHONE"
            transformation_expression: "phone"

          - id: "FAX"
            transformation_expression: "fax"
